<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creacion de Contraseña</title>
    <link rel="stylesheet" href="password.css">
</head>
<body>
    <div class="main-container">
      <a href="#" class="image-block">
        <img src="https://i.postimg.cc/TwvhSyv3/Screenshot-20260504-123414-com-android-chrome-Chrome-Tabbed-Activity.jpg" alt="Imagen cambiante">
        </a>
        <div class="input-block">
            <label for="password">Introduce tu contraseña</label>
            <input type="password" id="password" name="password" placeholder="Contraseña">
        </div>

        <div class="button-block">
            <button type="submit">Botón de enviar</button>
        </div>

        <div class="requirements-block">
            <p>Minimo 8 caracteres</p>
            <p>Una letra mayuscula</p>
            <p>Un numero</p>
            </div>
    </div>
</body>
<script>
//Cambiar la imagen dependiendo del input de la contraseña mediante el boton:
const passwordInput = document.getElementById('password');
const imageBlock = document.querySelector('.image-block img');
const submitButton = document.querySelector('.button-block button');
submitButton.addEventListener('click', () => {
    const password = passwordInput.value;
    if (password.length >= 8 && /[A-Z]/.test(password) && /\d/.test(password)) {
        imageBlock.src = 'https://i.postimg.cc/MTzqV18L/Screenshot-20260504-123644-com-android-chrome-Chrome-Tabbed-Activity.jpg';
    } else {
        imageBlock.src = 'https://i.postimg.cc/TwvhSyv3/Screenshot-20260504-123414-com-android-chrome-Chrome-Tabbed-Activity.jpg';
    }
});
</script>    
</html>
