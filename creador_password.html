<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creacion de Contraseña</title>
    <link rel="stylesheet" href="password.css">
</head>
<body>
    <div class="main-container">
      <a href="#" class="image-block">
        <img src="https://i.postimg.cc/TwvhSyv3/Screenshot-20260504-123414-com-android-chrome-Chrome-Tabbed-Activity.jpg" alt="Imagen cambiante">
        </a>
        <div class="input-block">
            <label for="password">Introduce tu contraseña</label>
            <input type="text" id="password" name="password" placeholder="Contraseña">
        </div>

        <div class="button-block">
            <button type="submit">Botón de enviar</button>
        </div>

        <div class="requirements-block">
            <p>Minimo 8 caracteres</p>
            <p>Una letra mayuscula</p>
            <p>Un numero</p>
            <!--Boton para generar una contraseña automaticamente-->
            <button id="generatePassword">Generar Contraseña</button>
            </div>
    </div>

</body>
<script>
//Cambiar la imagen dependiendo del input de la contraseña mediante el boton:
const passwordInput = document.getElementById('password');
const imageBlock = document.querySelector('.image-block img');
const submitButton = document.querySelector('.button-block button');

submitButton.addEventListener('click', () => {
    const password = passwordInput.value;
    if (password.length >= 8 && /[A-Z]/.test(password) && /\d/.test(password)) {
        imageBlock.src = 'https://i.postimg.cc/MTzqV18L/Screenshot-20260504-123644-com-android-chrome-Chrome-Tabbed-Activity.jpg';
    } else {
        imageBlock.src = 'https://i.postimg.cc/TwvhSyv3/Screenshot-20260504-123414-com-android-chrome-Chrome-Tabbed-Activity.jpg';
    }
});

//Logica para generar una contraseña automaticamente al hacer click en el boton "Generar Contraseña"
const generateButton = document.getElementById('generatePassword');

function generatePassword() {
    const uppercaseChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lowercaseChars = 'abcdefghijklmnopqrstuvwxyz';
    const numberChars = '0123456789';
    const allChars = uppercaseChars + lowercaseChars + numberChars;

    let password = '';
    password += uppercaseChars[Math.floor(Math.random() * uppercaseChars.length)];
    password += numberChars[Math.floor(Math.random() * numberChars.length)];

    for (let i = 0; i < 6; i++) {
        password += allChars[Math.floor(Math.random() * allChars.length)];
    }

    //Mezclar los caracteres para que la mayuscula y el numero no esten siempre al inicio
    password = password.split('').sort(() => 0.5 - Math.random()).join('');
    return password;
}

generateButton.addEventListener('click', () => {
    passwordInput.value = generatePassword();
});
</script>    
</html>
